# Single source of truth for everything configurable.
# https is just a placeholder host; set this to the real app before running.
base_url   = "https://myapp"          # no trailing slash
# Filesystem path. Use single quotes (TOML "literal string") so Windows
# backslashes are taken verbatim, e.g. output_dir = 'C:\Users\Operator\Downloads'.
# A double-quoted "C:\Users\..." is parsed as escape sequences and fails (\U -> hex).
# Forward slashes work too and are accepted by Windows: "C:/Users/Operator/Downloads".
output_dir = 'downloads'              # where rescued files are written (grouped into per-element subfolders)
# State DB tracking what's already downloaded, so re-runs skip finished files.
# Relative paths resolve next to this config (alongside logs/). Single-quote
# Windows paths, e.g. db_path = 'C:\Users\Operator\madonis.db'.
db_path    = 'madonis.db'

[reader]
path        = "/main.view?reader=Reader#0"
click_x     = 469                     # canvas click target (px from viewport top-left)
click_y     = 303
load_wait_s = 10                      # confirmed wait after navigation before clicking

[network]
nav_timeout_s      = 30               # page.goto timeout
response_timeout_s = 30               # how long to wait for the openWithEditor response
download_lang      = "pl"             # the &lang= value on dms download URLs

[browser]
viewport_width  = 1920                # confirmed: 1920x600 makes (469,303) land on the right target
viewport_height = 600
device_scale    = 1
# Use the system-installed browser (no Playwright-bundled Chromium download).
# On the target machine set channel = "chrome"; on this dev machine "chromium".
# Leave channel = "" and set executable_path instead to point at a binary directly.
# executable_path is a filesystem path: single-quote it on Windows so backslashes
# are literal, e.g. executable_path = 'C:\Program Files\Google\Chrome\chrome.exe'.
channel         = "chromium"
executable_path = ''
# Debugging: set headless = false to watch the browser, or pass --headed on the CLI.
# slow_mo_ms slows every action so clicks/navigation are visible (CLI: --slow-mo MS).
headless        = true
slow_mo_ms      = 0
